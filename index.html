<!DOCTYPE html>
<html lang="en" id="home">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bootstrap demo</title>
    <!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous" /> -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">

    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <!-- Navbar Start -->
    <nav class="navbar fixed-top navbar-expand-lg" style="background-color: #693c09;">
      <div class="container">
        <a class="navbar-brand" href="#">Paradis</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="#home">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link ms-4" href="#product">Product</a>
            </li>
            <li class="nav-item">
              <a class="nav-link ms-4" href="#founder">Founder</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <!-- Navbar End -->


    <!-- Hero Start -->
    <section class="hero" id="hero">
      <div class="card rounded-0 text-white">
        <img src="assets2/hero.jpg" class="card-img" alt="...">
        <div class="card-img-overlay text-center">
          <h1 class="card-title">Paradis Jewels</h1>
          <p class="lead">Luxury from scratch</p>
        </div>
      </div>
    </section>
    <!-- Hero End -->

    <!-- Menu Start -->
    <section class="product py-5" id="product">
      <div class="container">
        <h2 class="section-title text-center h3">PRODUCT</h2>
        <p class="section-paragraf text-center">By our hands to you, with love.</p>
      
        <div class="row justify-content-center gy-3">
          <div class="col-md-4 col-lg-3">
            <div class="card border-0 rounded">
              <div class="card-body">
                <img src="assets2/bracelet.jpg" class="w-100 rounded" alt="Hi, Daisy.">
                <h5 class="card-title text-center">Hi, Daisy.</h5>
                <p class="card-text text-center">Bracelet</p>
                <span class="btn btn-sm container">$150</span>
              </div>
            </div>
          </div>
        
          <div class="col-md-4 col-lg-3">
            <div class="card border-0 rounded">
              <div class="card-body">
                <img src="assets2/earrings.jpg" class="w-100 rounded" alt="Dear, Butterfly.">
                <h5 class="card-title text-center">Dear, Butterfly.</h5>
                <p class="card-text text-center">Earrings</p>
                <span class="btn btn-sm container">$130</span>
              </div>
            </div>
          </div>
        
          <div class="col-md-4 col-lg-3">
            <div class="card border-0 rounded">
              <div class="card-body">
                <img src="assets2/necklace.jpg" class="w-100 rounded" alt="Bye, Rose.">
                <h5 class="card-title text-center">Bye, Rose.</h5>
                <p class="card-text text-center">Necklace</p>
                <span class="btn btn-sm container">$200</span>
              </div>
            </div>
          </div>
        
        </div>
      </div>
    </section>
    <!-- Menu End -->


    <!-- Founder Start -->
    <section class="founder py-5 text-white" id="founder">
      <div class="container text-center">
        <img src="assets2/historia.jpg" class="rounded-circle mb-3" alt="Historia Reiss">
        <figure>
          <blockquote class="blockquote">
            <p>Paradis grows from luxury and the love of its people</p>
          </blockquote>
          <figcaption class="blockquote-footer text-white">
            Historia Reiss, Founder of Paradis
          </figcaption>
        </figure>
      </div>
    </section>
    <!-- Founder End -->


    <!-- Footer Start -->
    <footer class="py-3 text-center" style="color: #fff">
      <p class="m-0">Copyright &copy; 2023. Paradis</p>
    </footer>
    <!-- Footer End -->

    <!-- <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script> -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>

  </body>
</html>
